<html>
<head>
    <title>Estructura de una tabla</title>
</head>
<body>

<h2>Estructura de una tabla</h2>

<table border="5">
    <!-- Fila 1 -->
    <tr>
        <td rowspan="2">prueba</td>
        <td colspan="4">prueba</td>
    </tr>

    <!-- Fila 2 -->
    <tr>
        <td colspan="2">prueba</td>
        <td colspan="2">prueba</td>
    </tr>

    <!-- Fila 3 -->
    <tr>
        <td>prueba</td>
        <td>xd</td>
        <td rowspan="2">x2</td>
        <td>xd</td>
        <td>xd</td>
    </tr>

    <!-- Fila 4 -->
    <tr>
        <td colspan="1">xd1</td>
        <td>xd</td>
        <td>xd</td>
        <td>xd</td>
    </tr>

    <!-- Fila 5 -->
    <tr>
        <td colspan="1">xd2</td>
        <td>xd</td>
        <td>xd</td>
        <td>xd</td>
        <td>xd</td>
    </tr>

    <!-- Fila 6 -->
    <tr>
        <td colspan="1">xd3</td>
        <td>xd</td>
        <td>xd</td>
        <td>xd</td>
        <td>xd</td>
    </tr>

</table>

</body>
</html>
